version: '3.8'

services:
  reddit-miner:
    build: .
    container_name: reddit-miner
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: reddit-miner-redis
    restart: always
    volumes:
      - redis_data:/data

volumes:
  redis_data:
